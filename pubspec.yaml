name: zTerm
description: A cross-platform SSH + SFTP client application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  dartssh2: ^2.7.0
  xterm: ^4.0.0
  desktop_drop: ^0.4.4
  webdav_client: ^1.2.0
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  shared_preferences: ^2.2.0
  file_picker: ^8.0.0
  url_launcher: ^6.2.0
  path: ^1.8.3
  intl: ^0.18.1
  uuid: ^4.2.0
  share_plus: ^7.2.0
  cross_file: ^0.3.5+4
  ffi: ^2.1.0
  win32: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
